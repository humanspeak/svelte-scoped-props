packages:
    - .
    - docs
allowBuilds:
    '@humanspeak/docs-kit': true
    '@humanspeak/docs-kit@https://codeload.github.com/humanspeak/docs-kit/tar.gz/480c160c9839e47f0856b707dff70147167ea845': true
    core-js: true
    esbuild: true
    sharp: true
    workerd: true
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
    - '@humanspeak/*'
    - 'svelte'
    - '@types/node@26.0.0'
    - '@vitest/browser@4.1.8'
    - '@vitest/coverage-v8@4.1.8'
    - '@vitest/expect@4.1.8'
    - '@vitest/mocker@4.1.8'
    - '@vitest/pretty-format@4.1.8'
    - '@vitest/runner@4.1.8'
    - '@vitest/snapshot@4.1.8'
    - '@vitest/spy@4.1.8'
    - '@vitest/utils@4.1.8'
    - prettier-plugin-svelte@4.1.0
    - svelte-check@4.5.0
    - vite@8.0.16
    - vitest@4.1.8
