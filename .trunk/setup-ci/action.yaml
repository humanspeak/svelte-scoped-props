name: Trunk Code Quality setup
description: Set up dependencies for Trunk Code Quality
runs:
    using: composite
    steps:
        - name: Setup Node.js
          uses: actions/setup-node@v6 # zizmor: ignore[unpinned-uses]
          with:
              node-version: 24

        - uses: pnpm/action-setup@v6 # zizmor: ignore[unpinned-uses]

        - name: Install Root NodeJS dependencies
          shell: bash
          run: |
              pnpm install --frozen-lockfile
