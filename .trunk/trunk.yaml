# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
    version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
    sources:
        - id: trunk
          ref: v1.10.2
          uri: https://github.com/trunk-io/plugins
# Trunk runs Prettier from an isolated tool install, so include the plugins
# named by docs/.prettierrc in that install.
tools:
    definitions:
        - name: prettier
          runtime: node
          package: prettier
          shims: [prettier]
          extra_packages:
              - prettier-plugin-organize-imports@4.3.0
              - prettier-plugin-svelte@4.1.1
              - prettier-plugin-tailwindcss@0.8.0
              - svelte@5.56.4
              - tailwindcss@4.3.1
              - typescript@6.0.3
          known_good_version: 3.8.4
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
    enabled:
        - go@1.21.0
        - python@3.14.4
        - node@22.16.0
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
    ignore:
        - linters: [ALL]
          paths:
              - '**/worker-configuration.d.ts'
              - convex/_generated/**
              # shadcn-style registry blobs — generated/curated externally;
              # don't let the formatter rewrite their indent on every run.
              - docs/static/r/**
        - linters: [osv-scanner]
          paths:
              - '**/pnpm-lock.yaml'
        - linters: [markdownlint]
          paths:
              - .changeset/**
    definitions:
        - name: prettier
          files:
              - typescript
              - svelte
              - yaml
              - css
              - postcss
              - sass
              - html
              - markdown
              - json
              - javascript
              - graphql
              - prettier_supported_configs
    enabled:
        - grype@0.114.0
        - sort-package-json@4.0.0
        - actionlint@1.7.12
        - checkov@3.3.2
        - git-diff-check
        - markdownlint@0.49.0
        - osv-scanner@2.4.0
        - oxipng@10.1.1
        - prettier@3.8.4
        - shellcheck@0.11.0
        - shfmt@3.6.0
        - svgo@4.0.1
        - taplo@0.10.0
        - trufflehog@3.95.6
        - yamllint@1.38.0
actions:
    disabled:
        - trunk-announce
        - trunk-check-pre-push
        - trunk-fmt-pre-commit
        - trunk-upgrade-available
